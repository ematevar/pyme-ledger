<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYME-Ledger Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const refreshData = () => {
                setLoading(true);
                fetch('/api/dashboard/')
                    .then(res => res.json())
                    .then(json => {
                        setData(json);
                        setLoading(false);
                    });
            };

            useEffect(() => refreshData(), []);

            if (loading && !data) return <div class="flex items-center justify-center h-screen">Cargando datos reales del Ledger...</div>;

            return (
                <div class="flex">
                    <div class="w-64 bg-slate-900 text-white min-h-screen p-6 fixed shadow-xl">
                        <div class="mb-10">
                            <h1 class="text-2xl font-bold tracking-tight">PYME-Ledger</h1>
                            <p class="text-xs text-slate-400">Motor Beancount Activo</p>
                        </div>
                        <nav class="space-y-2">
                            <NavItem active={view==='dashboard'} onClick={()=>setView('dashboard')} label="Dashboard" />
                            <NavItem active={view==='pos'} onClick={()=>setView('pos')} label="Venta (POS)" />
                            <NavItem active={view==='inventory'} onClick={()=>setView('inventory')} label="Inventario" />
                        </nav>
                    </div>

                    <div class="ml-64 p-10 w-full">
                        {view === 'dashboard' && <Dashboard data={data} />}
                        {view === 'pos' && <POS products={data.products} onSale={refreshData} />}
                        {view === 'inventory' && <Inventory items={data.products} />}
                    </div>
                </div>
            );
        };

        const NavItem = ({ active, onClick, label }) => (
            <button onClick={onClick} class={`w-full text-left p-3 rounded-lg transition-all ${active ? 'bg-blue-600 shadow-lg text-white font-bold' : 'text-slate-300 hover:bg-slate-800'}`}>
                {label}
            </button>
        );

        const Dashboard = ({ data }) => {
            const pen = data?.metrics?.PEN || {};
            return (
                <div class="animate-in fade-in duration-500">
                    <h2 class="text-3xl font-bold text-slate-800 mb-8">Dashboard Financiero</h2>
                    
                    {/* Fila 1: Activos y Utilidad */}
                    <div class="grid grid-cols-2 gap-6 mb-6">
                        <div class="bg-blue-600 p-8 rounded-3xl shadow-xl text-white">
                            <p class="text-blue-100 text-xs uppercase font-bold tracking-wider mb-2">Total Activos (Caja + Stock)</p>
                            <p class="text-4xl font-extrabold">S/ {pen.totalAssets?.toLocaleString()}</p>
                        </div>
                        <div class="bg-emerald-600 p-8 rounded-3xl shadow-xl text-white">
                            <p class="text-emerald-100 text-xs uppercase font-bold tracking-wider mb-2">Utilidad Neta (Ganancia)</p>
                            <p class="text-4xl font-extrabold">S/ {pen.netProfit?.toLocaleString()}</p>
                        </div>
                    </div>

                    {/* Fila 2: Detalles */}
                    <div class="grid grid-cols-3 gap-6 mb-10">
                        <StatCard label="Efectivo en Caja" val={pen.cash} icon="💰" />
                        <StatCard label="Valor Inventario" val={pen.inventory} icon="📦" />
                        <StatCard label="Patrimonio Total" val={pen.totalEquity} icon="📈" />
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-slate-50">
                            <h3 class="font-bold text-slate-700">Últimos Movimientos Contables</h3>
                        </div>
                        <table class="w-full text-left">
                            <tbody class="divide-y divide-slate-100">
                                {data.recent_transactions.map((t, i) => (
                                    <tr key={i} class="hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 text-sm text-slate-500">{t.date.day} {t.date.month}</td>
                                        <td class="px-6 py-4 text-sm font-semibold text-slate-800">{t.description}</td>
                                        <td class="px-6 py-4 text-xs font-mono text-blue-600">{t.account}</td>
                                        <td class={`px-6 py-4 text-right font-bold ${t.type==='credit'?'text-green-600':'text-red-600'}`}>
                                            {t.type==='credit'?'+':'-'} {t.currency} {t.amount.toFixed(2)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, val, icon }) => (
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-start mb-4">
                    <p class="text-slate-400 text-xs uppercase font-bold tracking-wider">{label}</p>
                    <span class="text-xl">{icon}</span>
                </div>
                <p class="text-2xl font-bold text-slate-800 text-slate-800">S/ {val?.toLocaleString()}</p>
            </div>
        );

        const POS = ({ products, onSale }) => {
            const [ruc, setRuc] = useState('');
            const [inv, setInv] = useState('F001-');
            const [selectedSku, setSelectedSku] = useState(products[0]?.sku || '');
            const [qty, setQty] = useState(1);
            const [msg, setMsg] = useState(null);

            const selectedProd = products.find(p => p.sku === selectedSku);

            const sell = async (e) => {
                e.preventDefault();
                if (qty > selectedProd.stock) {
                    setMsg('❌ Error: Stock insuficiente');
                    return;
                }
                const res = await fetch('/api/pos/sale/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        customer_ruc: ruc,
                        invoice_no: inv,
                        items: [{ 
                            sku: selectedSku, 
                            qty: parseInt(qty), 
                            price: selectedProd.price, 
                            cost: selectedProd.cost 
                        }]
                    })
                });
                if (res.ok) {
                    setMsg('✅ Venta registrada con éxito!');
                    onSale();
                }
            };

            return (
                <div class="max-w-2xl mx-auto bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
                    <h2 class="text-2xl font-bold mb-8 text-center">Punto de Venta</h2>
                    <form onSubmit={sell} class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" value={ruc} onChange={e=>setRuc(e.target.value)} class="p-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 ring-blue-500" placeholder="RUC Cliente" required />
                            <input type="text" value={inv} onChange={e=>setInv(e.target.value)} class="p-3 border rounded-xl bg-slate-50 outline-none focus:ring-2 ring-blue-500" placeholder="Factura" required />
                        </div>
                        <div class="p-6 bg-blue-50 rounded-2xl space-y-4">
                            <select value={selectedSku} onChange={e=>setSelectedSku(e.target.value)} class="w-full p-3 rounded-xl border-none shadow-sm font-semibold">
                                {products.map(p => (
                                    <option key={p.sku} value={p.sku}>{p.name} (Stock: {p.stock})</option>
                                ))}
                            </select>
                            {selectedProd && (
                                <div class="flex justify-between items-center">
                                    <span class="text-blue-600 font-bold text-lg">S/ {selectedProd.price.toFixed(2)}</span>
                                    <input type="number" value={qty} onChange={e=>setQty(e.target.value)} min="1" max={selectedProd.stock} class="w-24 p-2 rounded-lg text-center font-bold" />
                                </div>
                            )}
                        </div>
                        <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">EMITIR VENTA: S/ {(selectedProd?.price * qty || 0).toFixed(2)}</button>
                    </form>
                    {msg && <div class={`mt-6 p-4 rounded-xl text-center font-bold ${msg.includes('❌')?'bg-red-50 text-red-600':'bg-green-50 text-green-600'}`}>{msg}</div>}
                </div>
            );
        };

        const Inventory = ({ items }) => (
            <div class="bg-white rounded-3xl shadow-sm border p-8">
                <h2 class="text-2xl font-bold mb-8">Kardex de Mercaderías</h2>
                <div class="space-y-4">
                    {items.map(item => (
                        <div key={item.sku} class="flex items-center justify-between p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            <div>
                                <h4 class="font-bold text-slate-800">{item.name}</h4>
                                <p class="text-xs text-slate-400">{item.sku}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-bold text-slate-900">{item.stock} uds.</p>
                                <p class="text-xs font-bold text-blue-600">Costo Unit: S/ {item.cost?.toFixed(2)}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
