<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYME-Ledger Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);

            const refreshData = () => {
                setLoading(true);
                fetch('/api/dashboard/')
                    .then(res => res.json())
                    .then(json => {
                        setData(json);
                        setLoading(false);
                    });
            };

            useEffect(() => refreshData(), []);

            if (loading && !data) return <div class="flex items-center justify-center h-screen">Cargando datos reales del Ledger...</div>;

            return (
                <div class="flex">
                    <div class="w-64 bg-slate-900 text-white min-h-screen p-6 fixed shadow-xl">
                        <div class="mb-10">
                            <h1 class="text-2xl font-bold tracking-tight">PYME-Ledger</h1>
                            <p class="text-xs text-slate-400">Motor Beancount Activo</p>
                        </div>
                        <nav class="space-y-2">
                            <NavItem active={view==='dashboard'} onClick={()=>setView('dashboard')} label="Dashboard" />
                            <NavItem active={view==='pos'} onClick={()=>setView('pos')} label="Venta (POS)" />
                            <NavItem active={view==='inventory'} onClick={()=>setView('inventory')} label="Inventario" />
                        </nav>
                        <div class="absolute bottom-6 left-6 text-xs text-slate-500">v2.0 Simplificado</div>
                    </div>

                    <div class="ml-64 p-10 w-full">
                        {view === 'dashboard' && <Dashboard data={data} />}
                        {view === 'pos' && <POS products={data.products} onSale={refreshData} />}
                        {view === 'inventory' && <Inventory items={data.products} totalValue={data.financial_data} />}
                    </div>
                </div>
            );
        };

        const NavItem = ({ active, onClick, label }) => (
            <button onClick={onClick} class={`w-full text-left p-3 rounded-lg transition-all ${active ? 'bg-blue-600 shadow-lg text-white font-bold' : 'text-slate-300 hover:bg-slate-800'}`}>
                {label}
            </button>
        );

        const Dashboard = ({ data }) => {
            const pen = data?.metrics?.PEN || {};
            return (
                <div class="animate-in fade-in duration-500">
                    <h2 class="text-3xl font-bold text-slate-800 mb-8">Estado Financiero Real</h2>
                    <div class="grid grid-cols-4 gap-6 mb-10">
                        <StatCard label="Total Activos" val={pen.totalAssets} />
                        <StatCard label="Efectivo" val={pen.cash} color="text-green-600" />
                        <StatCard label="Inventario" val={pen.inventory} color="text-blue-600" />
                        <StatCard label="Patrimonio" val={pen.totalEquity} />
                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 bg-slate-50">
                            <h3 class="font-bold text-slate-700">Libro Diario (Últimos Movimientos)</h3>
                        </div>
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-xs uppercase text-slate-400 bg-slate-50">
                                    <th class="px-6 py-3">Fecha</th>
                                    <th class="px-6 py-3">Descripción</th>
                                    <th class="px-6 py-3">Cuenta Destino</th>
                                    <th class="px-6 py-3 text-right">Monto</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                                {data.recent_transactions.map((t, i) => (
                                    <tr key={i} class="hover:bg-slate-50 transition-colors">
                                        <td class="px-6 py-4 text-sm text-slate-500">{t.date.day} {t.date.month}</td>
                                        <td class="px-6 py-4 text-sm font-semibold text-slate-800">{t.description}</td>
                                        <td class="px-6 py-4 text-xs font-mono text-blue-600 bg-blue-50/50 inline-block m-4 rounded">{t.account}</td>
                                        <td class={`px-6 py-4 text-right font-bold ${t.type==='credit'?'text-green-600':'text-red-600'}`}>
                                            {t.type==='credit'?'+':'-'} {t.currency} {t.amount.toFixed(2)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, val, color="text-slate-800" }) => (
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-wider mb-2">{label}</p>
                <p class={`text-3xl font-bold ${color}`}>S/ {val?.toLocaleString()}</p>
            </div>
        );

        const POS = ({ products, onSale }) => {
            const [ruc, setRuc] = useState('');
            const [inv, setInv] = useState('F001-');
            const [selectedSku, setSelectedSku] = useState(products[0]?.sku || '');
            const [qty, setQty] = useState(1);
            const [msg, setMsg] = useState(null);

            const selectedProd = products.find(p => p.sku === selectedSku);

            const sell = async (e) => {
                e.preventDefault();
                if (qty > selectedProd.stock) {
                    setMsg('❌ Error: Stock insuficiente');
                    return;
                }
                const res = await fetch('/api/pos/sale/', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        customer_ruc: ruc,
                        invoice_no: inv,
                        items: [{ 
                            sku: selectedSku, 
                            qty: parseInt(qty), 
                            price: selectedProd.price, 
                            cost: selectedProd.cost 
                        }]
                    })
                });
                if (res.ok) {
                    setMsg('✅ Venta registrada con éxito!');
                    onSale(); // Refresh global data
                }
            };

            return (
                <div class="max-w-2xl mx-auto bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
                    <h2 class="text-2xl font-bold mb-8 text-center">Punto de Venta (Salida de Almacén)</h2>
                    <form onSubmit={sell} class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400">RUC CLIENTE</label>
                                <input type="text" value={ruc} onChange={e=>setRuc(e.target.value)} class="w-full p-3 border rounded-xl bg-slate-50 focus:ring-2 ring-blue-500 outline-none" placeholder="20..." required />
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-slate-400">NRO FACTURA</label>
                                <input type="text" value={inv} onChange={e=>setInv(e.target.value)} class="w-full p-3 border rounded-xl bg-slate-50 focus:ring-2 ring-blue-500 outline-none" placeholder="F001-0001" required />
                            </div>
                        </div>

                        <div class="p-6 bg-blue-50 rounded-2xl space-y-4">
                            <div class="space-y-1">
                                <label class="text-xs font-bold text-blue-400 uppercase">Seleccionar Producto en Stock</label>
                                <select value={selectedSku} onChange={e=>setSelectedSku(e.target.value)} class="w-full p-3 border-none rounded-xl bg-white shadow-sm font-semibold text-slate-700">
                                    {products.map(p => (
                                        <option key={p.sku} value={p.sku}>{p.name} (Disp: {p.stock})</option>
                                    ))}
                                </select>
                            </div>
                            {selectedProd && (
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-blue-600 font-bold">PRECIO UNIT: S/ {selectedProd.price.toFixed(2)}</span>
                                    <div class="flex items-center gap-3">
                                        <label class="font-bold text-slate-500">CANT:</label>
                                        <input type="number" value={qty} onChange={e=>setQty(e.target.value)} min="1" max={selectedProd.stock} class="w-20 p-2 rounded-lg border-none shadow-sm text-center font-bold" />
                                    </div>
                                </div>
                            )}
                        </div>

                        <div class="pt-4 border-t border-slate-100 flex justify-between items-center">
                            <div class="text-2xl font-bold text-slate-800">TOTAL: S/ {(selectedProd?.price * qty || 0).toFixed(2)}</div>
                            <button class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all transform hover:scale-105 active:scale-95">EMITIR VENTA</button>
                        </div>
                    </form>
                    {msg && <div class={`mt-6 p-4 rounded-xl text-center font-bold ${msg.includes('❌')?'bg-red-50 text-red-600':'bg-green-50 text-green-600 animate-bounce'}`}>{msg}</div>}
                </div>
            );
        };

        const Inventory = ({ items }) => (
            <div class="bg-white rounded-2xl shadow-sm border p-8">
                <h2 class="text-2xl font-bold mb-8">Inventario Actual (Kardex Valorizado)</h2>
                <div class="grid grid-cols-1 gap-4">
                    {items.map(item => (
                        <div key={item.sku} class="flex items-center justify-between p-6 bg-slate-50 rounded-2xl border border-slate-100">
                            <div>
                                <h4 class="font-bold text-slate-800">{item.name}</h4>
                                <p class="text-xs text-slate-400 font-mono">{item.sku}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-bold text-slate-900">{item.stock} Unidades</p>
                                <p class="text-xs font-bold text-blue-600">Valor Estimado: S/ {(item.stock * item.price).toFixed(2)}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
