version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: python manage.py runserver 0.0.0.0:8000

  fava:
    build: .
    volumes:
      - .:/app
    ports:
      - "5001:5000"
    command: fava --host 0.0.0.0 /app/data/main.beancount
